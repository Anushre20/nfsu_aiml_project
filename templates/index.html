<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReAct AI Agent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(135deg, #e0f2fe 0%, #e0f7e9 50%, #d1fae5 100%);
      background-attachment: fixed;
      color: #1e293b;
    }

    /* ── Glass Header ── */
    .header {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .header h1 {
      font-size: 18px; font-weight: 600;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    /* ── Workspace Controls ── */
    .ws-row {
      flex: 1; min-width: 240px; display: flex; align-items: center; gap: 6px;
    }
    .ws-row .ws-icon { font-size: 14px; opacity: 0.5; }
    .ws-input {
      flex: 1; font-size: 12px; font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; padding: 5px 10px; color: #1e293b; outline: none;
      transition: border 0.2s;
    }
    .ws-input:focus { border-color: #0ea5e9; }
    .ws-input.error { border-color: #ef4444; background: rgba(254,226,226,0.5); }
    .ws-btn {
      background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px;
      color: #1e293b; transition: background 0.15s;
    }
    .ws-btn:hover { background: rgba(255,255,255,0.8); }
    .ws-error {
      font-size: 11px; color: #ef4444; margin-top: 2px; min-height: 16px;
      width: 100%; text-align: right;
    }

    /* ── Chat Area ── */
    .chat {
      flex: 1; overflow-y: auto; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .message { max-width: 780px; width: 100%; margin: 0 auto; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    /* ── Glass Bubbles ── */
    .bubble {
      padding: 14px 18px; border-radius: 16px; line-height: 1.6; font-size: 14px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .message.user .bubble {
      background: rgba(14,165,233,0.2);
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: rgba(255,255,255,0.3);
      border-bottom-left-radius: 4px;
    }

    .delegation-note {
      font-size: 12px; color: #0ea5e9; padding: 4px 0; margin-top: 4px;
      font-weight: 500;
    }

    /* ── Steps ── */
    .steps-toggle { margin-top: 10px; }
    .steps-toggle summary {
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: #0ea5e9; user-select: none;
    }
    .steps-toggle summary:hover { color: #0284c7; }
    .steps {
      margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .step {
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px; padding: 10px 14px; font-size: 13px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .step .label {
      color: #64748b; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 2px;
    }
    .step .value { color: #1e293b; white-space: pre-wrap; word-break: break-word; }
    .step .value.code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px;
      background: rgba(255,255,255,0.4); padding: 6px 8px; border-radius: 6px;
      margin-top: 2px;
    }
    .agent-tag {
      display: inline-block; font-size: 10px; font-weight: 500;
      background: rgba(14,165,233,0.15); color: #0284c7;
      padding: 1px 7px; border-radius: 4px; margin-left: 6px;
    }

    /* ── Bottom Bar ── */
    .bottom {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.5);
      padding: 16px 28px;
    }
    .input-row { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; }
    .input-row input {
      flex: 1; padding: 11px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.4); color: #1e293b; font-size: 14px;
      outline: none; transition: border 0.2s;
    }
    .input-row input:focus { border-color: #0ea5e9; }
    .input-row input::placeholder { color: #94a3b8; }
    .input-row input:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-row button {
      padding: 11px 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .input-row button:hover:not(:disabled) { opacity: 0.85; }
    .input-row button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      max-width: 780px; margin: 0 auto 8px; font-size: 13px; color: #475569;
      display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(14,165,233,0.2);
      border-top-color: #0ea5e9;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .hidden { display: none !important; }

    /* ── Workspace Lock Overlay ── */
    .ws-lock-msg {
      max-width: 780px; margin: 0 auto 8px; font-size: 13px; color: #dc2626;
      display: flex; align-items: center; gap: 6px;
    }
    .ws-lock-msg.hidden { display: none; }
    .ws-lock-msg .icon { font-size: 16px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ReAct AI Agent</h1>
    <div class="ws-row">
      <span class="ws-icon">&#128193;</span>
      <input type="text" class="ws-input" id="wsInput" value="{{ workspace }}" spellcheck="false" />
      <button class="ws-btn" id="wsSaveBtn">Update</button>
    </div>
    <div class="ws-error" id="wsError"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">
    <div class="ws-lock-msg hidden" id="wsLockMsg">
      <span class="icon">&#9888;</span>
      <span>Invalid workspace path. Set a valid directory to continue.</span>
    </div>
    <div class="status hidden" id="status">
      <span class="spinner"></span>
      <span id="statusText">Processing...</span>
    </div>
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="Ask something..." autofocus />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const wsInput = document.getElementById('wsInput');
    const wsSaveBtn = document.getElementById('wsSaveBtn');
    const wsError = document.getElementById('wsError');
    const wsLockMsg = document.getElementById('wsLockMsg');
    let locked = false;
    let wsValid = true;

    function setWorkspaceLock(valid) {
      wsValid = valid;
      wsLockMsg.classList.toggle('hidden', valid);
      wsInput.classList.toggle('error', !valid);
      if (!valid) {
        input.disabled = true;
        sendBtn.disabled = true;
      } else if (!locked) {
        input.disabled = false;
        sendBtn.disabled = false;
      }
    }

    function saveWorkspace() {
      const path = wsInput.value.trim();
      if (!path) return;
      wsSaveBtn.disabled = true;
      wsSaveBtn.textContent = '...';
      wsError.textContent = '';
      fetch('/api/workspace', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      }).then(r => r.json()).then(data => {
        if (data.path) {
          wsInput.value = data.path;
          wsError.textContent = '';
          setWorkspaceLock(true);
        } else if (data.error) {
          wsError.textContent = data.error;
          setWorkspaceLock(false);
        }
      }).catch(() => {
        wsError.textContent = 'Connection error';
        setWorkspaceLock(false);
      }).finally(() => {
        wsSaveBtn.disabled = false;
        wsSaveBtn.textContent = 'Update';
      });
    }

    // Validate workspace on page load
    fetch('/api/workspace').then(r => r.json()).then(data => {
      if (data.path) {
        const p = data.path;
        // Verify path exists by trying to use it
        fetch('/api/workspace', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: p })
        }).then(r => r.json()).then(d => {
          if (d.error) setWorkspaceLock(false);
        });
      }
    });

    wsSaveBtn.addEventListener('click', saveWorkspace);
    wsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveWorkspace(); });

    function appendMessage(role, html) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function appendSteps(container, steps) {
      const wrapper = document.createElement('div');
      wrapper.className = 'steps';
      steps.forEach((s, i) => {
        const stepDiv = document.createElement('div');
        stepDiv.className = 'step';
        const agentTag = s.agent ? `<span class="agent-tag">${escapeHtml(s.agent)}</span>` : '';
        stepDiv.innerHTML = `
          <div class="label">Step ${i + 1} &mdash; ${escapeHtml(s.action)}${agentTag}</div>
          <div class="label" style="margin-top:6px">Thought</div>
          <div class="value">${escapeHtml(s.thought)}</div>
          <div class="label" style="margin-top:6px">Action Input</div>
          <div class="value code">${escapeHtml(s.action_input)}</div>
          <div class="label" style="margin-top:6px">Observation</div>
          <div class="value">${escapeHtml(s.observation)}</div>
        `;
        wrapper.appendChild(stepDiv);
      });
      container.appendChild(wrapper);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setLocked(lockedState) {
      locked = lockedState;
      if (wsValid) {
        input.disabled = lockedState;
        sendBtn.disabled = lockedState;
      }
      status.classList.toggle('hidden', !lockedState);
    }

    function handleSend() {
      const prompt = input.value.trim();
      if (!prompt || locked || !wsValid) return;

      setLocked(true);
      statusText.textContent = 'Starting...';
      input.value = '';

      appendMessage('user', `<div class="bubble">${escapeHtml(prompt)}</div>`);

      const assistantDiv = appendMessage('assistant', `
        <div class="bubble" id="assistantBubble">
          <div class="status" style="margin:0;padding:0;color:#475569;">
            <span class="spinner"></span>
            <span id="stepIndicator">Initializing...</span>
          </div>
        </div>
      `);

      const bubble = document.getElementById('assistantBubble');
      const stepIndicator = document.getElementById('stepIndicator');
      let delegationDiv = null;

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      }).then(async (response) => {
        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let steps = [];
        let finalAnswer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));

            if (data.type === 'subtasks') {
              const count = (data.subtasks || []).length;
              stepIndicator.textContent = `Planning (${count} subtasks)...`;
            } else if (data.type === 'delegation') {
              stepIndicator.textContent = data.message || 'Delegating...';
              if (!delegationDiv) {
                delegationDiv = document.createElement('div');
                delegationDiv.className = 'delegation-note';
                bubble.appendChild(delegationDiv);
              }
              delegationDiv.textContent = '> ' + (data.message || '');
            } else if (data.type === 'step') {
              const stepLabel = data.subtask
                ? `[${data.agent || 'agent'}] ${data.action}`
                : `${data.action}`;
              stepIndicator.textContent = `Step: ${stepLabel}`;
              steps.push(data);
            } else if (data.type === 'done') {
              finalAnswer = data.final_answer || '';
              steps = data.steps || [];

              bubble.innerHTML = '';

              const answerEl = document.createElement('div');
              answerEl.style.marginBottom = steps.length ? '8px' : '0';
              answerEl.textContent = finalAnswer;
              bubble.appendChild(answerEl);

              if (steps.length) {
                const details = document.createElement('details');
                details.className = 'steps-toggle';
                const summary = document.createElement('summary');
                const agentCount = new Set(steps.filter(s => s.agent).map(s => s.agent)).size;
                const label = agentCount > 0
                  ? `View Agent Reasoning (${steps.length} steps, ${agentCount} agents)`
                  : `View Agent Reasoning (${steps.length} steps)`;
                summary.textContent = label;
                details.appendChild(summary);
                appendSteps(details, steps);
                bubble.appendChild(details);
              }
            }
          }
        }
      }).catch((err) => {
        bubble.innerHTML = `<div style="color:#dc2626;">Error: ${err.message}</div>`;
      }).finally(() => {
        setLocked(false);
      });
    }

    sendBtn.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });
  </script>
</body>
</html>
