<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ReAct AI Agent</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, sans-serif;
      height: 100vh; display: flex; flex-direction: column;
      background: linear-gradient(135deg, #e0f2fe 0%, #e0f7e9 50%, #d1fae5 100%);
      background-attachment: fixed;
      color: #1e293b;
    }

    /* ── Glass Header ── */
    .header {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid rgba(255,255,255,0.5);
      padding: 14px 28px;
      display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
    }
    .header h1 {
      font-size: 18px; font-weight: 600;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      white-space: nowrap;
    }

    /* ── Workspace Controls ── */
    .ws-row {
      flex: 1; min-width: 240px; display: flex; align-items: center; gap: 6px;
    }
    .ws-row .ws-icon { font-size: 14px; opacity: 0.5; }
    .ws-input {
      flex: 1; font-size: 12px; font-family: 'JetBrains Mono', monospace;
      background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; padding: 5px 10px; color: #1e293b; outline: none;
      transition: border 0.2s;
    }
    .ws-input:focus { border-color: #0ea5e9; }
    .ws-input.error { border-color: #ef4444; background: rgba(254,226,226,0.5); }
    .ws-btn {
      background: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.6);
      border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px;
      color: #1e293b; transition: background 0.15s;
    }
    .ws-btn:hover { background: rgba(255,255,255,0.8); }
    .ws-error {
      font-size: 11px; color: #ef4444; margin-top: 2px; min-height: 16px;
      width: 100%; text-align: right;
    }

    /* ── Chat Area ── */
    .chat {
      flex: 1; overflow-y: auto; padding: 24px 28px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .message { max-width: 780px; width: 100%; margin: 0 auto; }
    .message.user { align-self: flex-end; }
    .message.assistant { align-self: flex-start; }

    /* ── Glass Bubbles ── */
    .bubble {
      padding: 14px 18px; border-radius: 16px; line-height: 1.6; font-size: 14px;
      backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.5);
    }
    .message.user .bubble {
      background: rgba(14,165,233,0.2);
      border-bottom-right-radius: 4px;
    }
    .message.assistant .bubble {
      background: rgba(255,255,255,0.3);
      border-bottom-left-radius: 4px;
    }

    .delegation-note {
      font-size: 12px; color: #0ea5e9; padding: 4px 0; margin-top: 4px;
      font-weight: 500;
    }

    /* ── Steps ── */
    .steps-toggle { margin-top: 10px; }
    .steps-toggle summary {
      cursor: pointer; font-size: 13px; font-weight: 500;
      color: #0ea5e9; user-select: none;
    }
    .steps-toggle summary:hover { color: #0284c7; }
    .steps {
      margin-top: 10px; display: flex; flex-direction: column; gap: 8px;
    }
    .step {
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.4);
      border-radius: 10px; padding: 10px 14px; font-size: 13px;
      backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    }
    .step .label {
      color: #64748b; font-size: 11px; text-transform: uppercase;
      letter-spacing: 0.5px; margin-bottom: 2px;
    }
    .step .value { color: #1e293b; white-space: pre-wrap; word-break: break-word; }
    .step .value.code {
      font-family: 'JetBrains Mono', 'Fira Code', monospace; font-size: 12px;
      background: rgba(255,255,255,0.4); padding: 6px 8px; border-radius: 6px;
      margin-top: 2px;
    }
    .agent-tag {
      display: inline-block; font-size: 10px; font-weight: 500;
      background: rgba(14,165,233,0.15); color: #0284c7;
      padding: 1px 7px; border-radius: 4px; margin-left: 6px;
    }

    /* ── Bottom Bar ── */
    .bottom {
      background: rgba(255,255,255,0.35);
      backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(255,255,255,0.5);
      padding: 16px 28px;
    }
    .input-row { max-width: 780px; margin: 0 auto; display: flex; gap: 8px; }
    .input-row input {
      flex: 1; padding: 11px 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.5);
      background: rgba(255,255,255,0.4); color: #1e293b; font-size: 14px;
      outline: none; transition: border 0.2s;
    }
    .input-row input:focus { border-color: #0ea5e9; }
    .input-row input::placeholder { color: #94a3b8; }
    .input-row input:disabled { opacity: 0.4; cursor: not-allowed; }
    .input-row button {
      padding: 11px 24px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #0ea5e9, #10b981);
      color: #fff; font-size: 14px; font-weight: 500; cursor: pointer;
      transition: opacity 0.15s; white-space: nowrap;
    }
    .input-row button:hover:not(:disabled) { opacity: 0.85; }
    .input-row button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ── Status ── */
    .status {
      max-width: 780px; margin: 0 auto 8px; font-size: 13px; color: #475569;
      display: flex; align-items: center; gap: 8px;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid rgba(14,165,233,0.2);
      border-top-color: #0ea5e9;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      display: inline-block; flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .hidden { display: none !important; }

    /* ── Workspace Lock Overlay ── */
    .ws-lock-msg {
      max-width: 780px; margin: 0 auto 8px; font-size: 13px; color: #dc2626;
      display: flex; align-items: center; gap: 6px;
    }
    .ws-lock-msg.hidden { display: none; }
    .ws-lock-msg .icon { font-size: 16px; }
    .answer { line-height: 1.7; font-size: 15px; }
    .answer h1, .answer h2, .answer h3 { margin: 0.6em 0 0.3em; }
    .answer h1 { font-size: 1.3em; }
    .answer h2 { font-size: 1.15em; }
    .answer h3 { font-size: 1.05em; }
    .answer p { margin: 0.4em 0; }
    .answer ul, .answer ol { margin: 0.3em 0; padding-left: 1.5em; }
    .answer li { margin: 0.15em 0; }
    .answer code {
      font-family: 'JetBrains Mono', monospace; font-size: 13px;
      background: rgba(255,255,255,0.5); padding: 1px 5px; border-radius: 4px;
    }
    .answer pre {
      background: rgba(255,255,255,0.5); padding: 10px 12px; border-radius: 8px;
      overflow-x: auto; margin: 0.5em 0;
    }
    .answer pre code { background: none; padding: 0; }
    .answer strong { font-weight: 600; }
    .clear-btn {
      background: none; border: none; color: #94a3b8; font-size: 12px;
      cursor: pointer; padding: 2px 8px; border-radius: 4px;
      transition: color 0.15s;
    }
    .clear-btn:hover { color: #ef4444; }
  </style>
</head>
<body>
  <div class="header">
    <h1>ReAct AI Agent</h1>
    <div class="ws-row">
      <span class="ws-icon">&#128193;</span>
      <input type="text" class="ws-input" id="wsInput" value="{{ workspace }}" spellcheck="false" />
      <button class="ws-btn" id="wsSaveBtn">Update</button>
      <button class="clear-btn" id="clearBtn">&#128465;</button>
    </div>
    <div class="ws-error" id="wsError"></div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="bottom">
    <div class="ws-lock-msg hidden" id="wsLockMsg">
      <span class="icon">&#9888;</span>
      <span>Invalid workspace path. Set a valid directory to continue.</span>
    </div>
    <div class="status hidden" id="status">
      <span class="spinner"></span>
      <span id="statusText">Processing...</span>
    </div>
    <div class="input-row">
      <input type="text" id="promptInput" placeholder="Ask something..." autofocus />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const status = document.getElementById('status');
    const statusText = document.getElementById('statusText');
    const wsInput = document.getElementById('wsInput');
    const wsSaveBtn = document.getElementById('wsSaveBtn');
    const wsError = document.getElementById('wsError');
    const wsLockMsg = document.getElementById('wsLockMsg');
    const clearBtn = document.getElementById('clearBtn');
    let locked = false;
    let wsValid = true;

    // ── History persistence ──
    const STORAGE_KEY = 'react_chat_history';

    function saveHistory() {
      const messages = [];
      chat.querySelectorAll('.message').forEach(el => {
        const role = el.classList.contains('user') ? 'user' : 'assistant';
        const bubble = el.querySelector('.bubble');
        if (bubble) {
          // For user messages, store text content
          if (role === 'user') {
            messages.push({ role, text: bubble.textContent });
          } else {
            // For assistant messages, store the answer text and step count
            const answerEl = bubble.querySelector('.answer');
            const text = answerEl ? answerEl.textContent : bubble.textContent;
            messages.push({ role, text });
          }
        }
      });
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(messages));
      } catch(e) {}
    }

    function loadHistory() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const messages = JSON.parse(raw);
        messages.forEach(({ role, text }) => {
          if (role === 'user') {
            appendMessage('user', `<div class="bubble">${escapeHtml(text)}</div>`);
          } else if (text) {
            const html = `<div class="bubble"><div class="answer">${renderMarkdown(text)}</div></div>`;
            appendMessage('assistant', html);
          }
        });
      } catch(e) {}
    }

    function clearHistory() {
      if (!confirm('Clear all chat history?')) return;
      chat.innerHTML = '';
      localStorage.removeItem(STORAGE_KEY);
    }

    // ── Markdown ──
    function renderMarkdown(text) {
      if (!text) return '';
      try {
        return marked.parse(text);
      } catch(e) {
        return escapeHtml(text);
      }
    }

    // ── Truncate observations ──
    function truncateObs(action, obs) {
      if (!obs) return '';
      if (action === 'read_file') {
        return obs.length > 150 ? obs.substring(0, 150) + '...' : obs;
      }
      if (action === 'run_command') {
        return obs.length > 300 ? obs.substring(0, 300) + '...' : obs;
      }
      return obs;
    }

    // ── Workspace ──
    function setWorkspaceLock(valid) {
      wsValid = valid;
      wsLockMsg.classList.toggle('hidden', valid);
      wsInput.classList.toggle('error', !valid);
      if (!valid) {
        input.disabled = true;
        sendBtn.disabled = true;
      } else if (!locked) {
        input.disabled = false;
        sendBtn.disabled = false;
      }
    }

    function saveWorkspace() {
      const path = wsInput.value.trim();
      if (!path) return;
      wsSaveBtn.disabled = true;
      wsSaveBtn.textContent = '...';
      wsError.textContent = '';
      fetch('/api/workspace', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path })
      }).then(r => r.json()).then(data => {
        if (data.path) {
          wsInput.value = data.path;
          wsError.textContent = '';
          setWorkspaceLock(true);
        } else if (data.error) {
          wsError.textContent = data.error;
          setWorkspaceLock(false);
        }
      }).catch(() => {
        wsError.textContent = 'Connection error';
        setWorkspaceLock(false);
      }).finally(() => {
        wsSaveBtn.disabled = false;
        wsSaveBtn.textContent = 'Update';
      });
    }

    fetch('/api/workspace').then(r => r.json()).then(data => {
      if (data.path) {
        const p = data.path;
        fetch('/api/workspace', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ path: p })
        }).then(r => r.json()).then(d => {
          if (d.error) setWorkspaceLock(false);
        });
      }
    });

    wsSaveBtn.addEventListener('click', saveWorkspace);
    wsInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') saveWorkspace(); });
    clearBtn.addEventListener('click', clearHistory);

    // ── Chat ──
    function appendMessage(role, html) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.innerHTML = html;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function setLocked(lockedState) {
      locked = lockedState;
      if (wsValid) {
        input.disabled = lockedState;
        sendBtn.disabled = lockedState;
      }
      status.classList.toggle('hidden', !lockedState);
    }

    // ── Resume (continue after pause) ──
    function fetchResume(resumeContext, bubble, stepsContainer, stepIndicator) {
      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt: resumeContext.question, resume_from: resumeContext })
      }).then(async (response) => {
        if (!response.ok) throw new Error(`Server error: ${response.status}`);
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let prevCount = stepsContainer.querySelectorAll('.step').length;

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() || '';
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));
            if (data.type === 'step') {
              stepIndicator.textContent = `Running: ${data.action}`;
              prevCount++;
              const stepDiv = document.createElement('div');
              stepDiv.className = 'step';
              stepDiv.style.animation = 'fadeIn 0.25s ease';
              stepDiv.innerHTML = `
                <div class="label">Step ${prevCount} &mdash; ${escapeHtml(data.action)}</div>
                <div class="label" style="margin-top:6px">Thought</div>
                <div class="value">${escapeHtml(data.thought)}</div>
                <div class="label" style="margin-top:6px">Action Input</div>
                <div class="value code">${escapeHtml(data.action_input)}</div>
                <div class="label" style="margin-top:6px">Observation</div>
                <div class="value">${escapeHtml(truncateObs(data.action, data.observation))}</div>
              `;
              stepsContainer.appendChild(stepDiv);
              chat.scrollTop = chat.scrollHeight;
            } else if (data.type === 'paused') {
              // Another pause — replace continue button
              const oldBtn = stepsContainer.querySelector('button');
              if (oldBtn) oldBtn.remove();
              const pauseNote = document.createElement('div');
              pauseNote.style.cssText = 'margin:8px 0;font-size:13px;color:#64748b;';
              pauseNote.textContent = 'Reached step limit again. Continue?';
              stepsContainer.appendChild(pauseNote);
              const newBtn = document.createElement('button');
              newBtn.textContent = 'Continue';
              newBtn.className = 'ws-btn';
              newBtn.style.marginTop = '4px';
              newBtn.addEventListener('click', () => {
                newBtn.disabled = true;
                newBtn.textContent = 'Continuing...';
                fetchResume(data.resume_context, bubble, stepsContainer, stepIndicator);
              });
              stepsContainer.appendChild(newBtn);
              chat.scrollTop = chat.scrollHeight;
            } else if (data.type === 'done') {
              const statusEl = bubble.querySelector('.status');
              if (statusEl) statusEl.remove();
              // Remove any continue button/pause note
              const btn = stepsContainer.querySelector('button');
              if (btn) btn.remove();
              const notes = stepsContainer.querySelectorAll('div');
              notes.forEach(n => { if (n.textContent.includes('Continue')) n.remove(); });

              const answerEl = document.createElement('div');
              answerEl.className = 'answer';
              answerEl.innerHTML = renderMarkdown(data.final_answer || '');
              bubble.insertBefore(answerEl, stepsContainer);

              const totalSteps = stepsContainer.querySelectorAll('.step').length;
              if (totalSteps) {
                const details = document.createElement('details');
                details.className = 'steps-toggle';
                const summary = document.createElement('summary');
                summary.textContent = `View Agent Reasoning (${totalSteps} steps)`;
                details.appendChild(summary);
                while (stepsContainer.firstChild) {
                  details.appendChild(stepsContainer.firstChild);
                }
                bubble.appendChild(details);
                stepsContainer.remove();
              }
              saveHistory();
            }
          }
        }
      }).catch((err) => {
        const errEl = document.createElement('div');
        errEl.style.cssText = 'color:#dc2626;margin-top:8px;font-size:13px;';
        errEl.textContent = 'Continue error: ' + err.message;
        stepsContainer.appendChild(errEl);
      });
    }

    // ── Send ──
    function handleSend() {
      const prompt = input.value.trim();
      if (!prompt || locked || !wsValid) return;

      setLocked(true);
      statusText.textContent = 'Starting...';
      input.value = '';

      appendMessage('user', `<div class="bubble">${escapeHtml(prompt)}</div>`);
      saveHistory();

      const assistantDiv = appendMessage('assistant', `
        <div class="bubble" id="assistantBubble">
          <div class="steps" id="stepsContainer"></div>
          <div class="status" style="margin:0;padding:0;color:#475569;">
            <span class="spinner"></span>
            <span id="stepIndicator">Initializing...</span>
          </div>
        </div>
      `);

      const bubble = document.getElementById('assistantBubble');
      const stepsContainer = document.getElementById('stepsContainer');
      const stepIndicator = document.getElementById('stepIndicator');
      let stepCount = 0;

      function addStepCard(data) {
        stepCount++;
        const stepDiv = document.createElement('div');
        stepDiv.className = 'step';
        stepDiv.style.animation = 'fadeIn 0.25s ease';
        stepDiv.innerHTML = `
          <div class="label">Step ${stepCount} &mdash; ${escapeHtml(data.action)}</div>
          <div class="label" style="margin-top:6px">Thought</div>
          <div class="value">${escapeHtml(data.thought)}</div>
          <div class="label" style="margin-top:6px">Action Input</div>
          <div class="value code">${escapeHtml(data.action_input)}</div>
          <div class="label" style="margin-top:6px">Observation</div>
          <div class="value">${escapeHtml(truncateObs(data.action, data.observation))}</div>
        `;
        stepsContainer.appendChild(stepDiv);
        chat.scrollTop = chat.scrollHeight;
      }

      fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt })
      }).then(async (response) => {
        if (!response.ok) {
          throw new Error(`Server error: ${response.status}`);
        }
        const reader = response.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';
        let finalAnswer = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          const lines = buffer.split('\n');
          buffer = lines.pop() || '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));

            if (data.type === 'step') {
              stepIndicator.textContent = `Running: ${data.action}`;
              addStepCard(data);
            } else if (data.type === 'paused') {
              const statusEl = bubble.querySelector('.status');
              if (statusEl) statusEl.remove();

              // Remove spinner, show continue button
              stepIndicator.textContent = 'Step limit reached.';
              const pauseNote = document.createElement('div');
              pauseNote.style.cssText = 'margin:8px 0;font-size:13px;color:#64748b;';
              pauseNote.textContent = 'Reached step limit. Continue?';
              stepsContainer.appendChild(pauseNote);

              const continueBtn = document.createElement('button');
              continueBtn.textContent = 'Continue';
              continueBtn.className = 'ws-btn';
              continueBtn.style.marginTop = '4px';
              continueBtn.addEventListener('click', () => {
                continueBtn.disabled = true;
                continueBtn.textContent = 'Continuing...';
                // Add spinner back
                const spin = document.createElement('span');
                spin.className = 'spinner';
                spin.style.cssText = 'width:12px;height:12px;display:inline-block;margin-right:6px;';
                continueBtn.textContent = '';
                continueBtn.appendChild(spin);
                continueBtn.appendChild(document.createTextNode(' Continuing...'));

                fetchResume(data.resume_context, bubble, stepsContainer, stepIndicator);
              });
              stepsContainer.appendChild(continueBtn);
              chat.scrollTop = chat.scrollHeight;
            } else if (data.type === 'done') {
              finalAnswer = data.final_answer || '';

              const statusEl = bubble.querySelector('.status');
              if (statusEl) statusEl.remove();

              const answerEl = document.createElement('div');
              answerEl.className = 'answer';
              answerEl.innerHTML = renderMarkdown(finalAnswer);
              bubble.insertBefore(answerEl, stepsContainer);

              const stepsInContainer = stepsContainer.children.length;
              if (stepsInContainer) {
                const details = document.createElement('details');
                details.className = 'steps-toggle';
                const summary = document.createElement('summary');
                summary.textContent = `View Agent Reasoning (${stepsInContainer} steps)`;
                details.appendChild(summary);
                while (stepsContainer.firstChild) {
                  details.appendChild(stepsContainer.firstChild);
                }
                bubble.appendChild(details);
                stepsContainer.remove();
              }
              saveHistory();
            }
          }
        }
      }).catch((err) => {
        bubble.innerHTML = `<div class="bubble"><div style="color:#dc2626;">Error: ${err.message}</div></div>`;
      }).finally(() => {
        setLocked(false);
      });
    }

    // Load saved history on startup
    loadHistory();

    sendBtn.addEventListener('click', handleSend);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') handleSend(); });
  </script>
</body>
</html>
